   <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soeun Jeong - Resume</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.55;
      padding: 16px; 
    }

    .resume {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(229, 231, 235, 0.9);
    }

    .topbar {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 45%, #60a5fa 100%);
      color: white;
      padding: 40px 30px;
      position: relative;
    }

    .photo {
      position: absolute;
      top: 32px;
      right: 40px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px dashed rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 600px) {
      .photo {
        top: 20px;
        right: 20px;
        width: 75px;
        height: 75px;
      }
      .name { font-size: 1.8rem !important; }
      .topbar { padding: 30px 20px 20px; }
      .contact { flex-direction: column; gap: 4px; }
    }

    .name {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0;
    }

    .role {
      margin: 8px 0 18px;
      font-size: 1rem;
      font-weight: 600;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .content {
      display: grid;
      grid-template-columns: 290px 1fr;
    }

    @media (max-width: 800px) {
      .content { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
    }

    .sidebar {
      background: #fbfdff;
      border-right: 1px solid var(--line);
      padding: 32px 25px;
    }

    .main { padding: 32px 25px; }

    .section { margin-bottom: 28px; }

    .section-title {
      font-size: 0.84rem;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .item { margin-bottom: 18px; }
    .item-title { font-weight: 800; }
    ul { margin-left: 18px; padding-left: 0; }
  </style>
</
